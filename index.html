<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Smart Task Manager</h1>
        <button id="addTaskBtn">+ Add Task</button>
    </header>

    <main class="board">

        <div class="column" data-status="todo">
            <h2>Todo</h2>
            <div class="task-list" id="todo"></div>
        </div>

        <div class="column" data-status="doing">
            <h2>Doing</h2>
            <div class="task-list" id="doing"></div>
        </div>

        <div class="column" data-status="done">
            <h2>Done</h2>
            <div class="task-list" id="done"></div>
        </div>

    </main>

    <!-- Modal برای ویرایش تسک -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>ویرایش تسک</h2>
            <input type="text" id="modalTitle" placeholder="عنوان تسک">
            <select id="modalStatus">
        <option value="todo">Todo</option>
        <option value="doing">Doing</option>
        <option value="done">Done</option>
      </select>
            <select id="modalPriority">
        <option value="low">کم</option>
        <option value="medium">متوسط</option>
        <option value="high">زیاد</option>
      </select>
            <button id="saveTaskBtn">ذخیره</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
